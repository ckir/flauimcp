name: ci
on:
  push:
    branches: [ "**" ]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  unit:
    name: Unit (non-Desktop)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet build -c Release
      - name: Test (non-Desktop)
        run: dotnet test -c Release --filter "Category!=Desktop" --no-build

  desktop:
    name: Desktop (UIA)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build (incl. WPF TestApp)
        run: dotnet build -c Release
      # Authoritative Phase-3a gate: UIA pattern + cross-STA + perception Desktop tests (no synthetic
      # input). xunit.runner.json serializes collections so test classes don't fight for window focus.
      - name: Test (Desktop, UIA patterns)
        run: dotnet test -c Release --no-build --filter "Category=Desktop&FullyQualifiedName!~PopupGrafting"
      # Synthetic input (SendInput) — informational only: may be denied without a true interactive
      # input session. Failure here does NOT fail the build; it tells us if the runner allows it.
      - name: Test (synthetic input — informational)
        continue-on-error: true
        run: dotnet test -c Release --no-build --filter "FullyQualifiedName~PopupGrafting"
