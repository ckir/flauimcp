name: ci
on:
  push:
    branches: [ "**" ]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  unit:
    name: Unit (non-Desktop)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet build -c Release
      - name: Test (non-Desktop)
        run: dotnet test -c Release --filter "Category!=Desktop&Category!=KnownDefect" --no-build

  # NOTE: the Desktop (Category=Desktop) UIA suite is intentionally NOT a CI job. GitHub-hosted
  # windows-latest runners have no usable interactive session for UIA — the WPF TestApp launches but
  # UIA attach/snapshot blocks until timeout (verified: run 28227526600 hung ~15min on the test step).
  # Desktop tests are run locally on an interactive session:
  #   dotnet test --filter "Category=Desktop&FullyQualifiedName!~PopupGrafting"   # UIA pattern tests
  #   dotnet test --filter "FullyQualifiedName~PopupGrafting"                     # synthetic input
  # The synthetic-input test additionally needs a real (non-RDP, physical-console) input session.
  # A self-hosted runner with an interactive desktop could host these in the future.

  scaffolder-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Scaffold a throwaway tool and build
        shell: pwsh
        run: |
          ./scripts/new-tool.ps1 -Name DesktopCiSmoke
          if ($LASTEXITCODE -ne 0) { throw "new-tool.ps1 failed with exit $LASTEXITCODE" }
          dotnet build -c Release

  pester:
    name: Pester (scripts/)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.8.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -RequiredVersion 5.8.0
          $result = Invoke-Pester -Path scripts/ -CI -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) Pester test(s) failed." }
