name: release
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch: {}   # manual run: builds/tests/publishes to verify CI; skips the Release step (no tag)

permissions:
  contents: write   # create releases + upload assets

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build -c Release

      - name: Test (non-UIA only; runners are headless)
        run: dotnet test -c Release --filter "Category!=Desktop"

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/FlaUI.Mcp.Server -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $found = @(Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue)
          if (-not $found) { throw "ISCC.exe not found under any 'Inno Setup*' directory — is Inno Setup installed?" }
          $found | ForEach-Object { Write-Host "Found ISCC: $($_.FullName)" }
          if ($found.Count -gt 1) { Write-Warning "More than one Inno Setup install found; using the first logged. Verify the version above." }
          $iscc = $found[0].FullName
          Write-Host "Using $iscc"
          & $iscc installer\flaui-mcp.iss

      - name: Checksums
        shell: pwsh
        run: |
          Get-FileHash dist\flaui-mcp-setup.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  flaui-mcp-setup.exe" } | Out-File -Encoding ascii dist\SHA256SUMS.txt
          Get-FileHash publish\flaui-mcp.exe   -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  flaui-mcp.exe" }       | Out-File -Encoding ascii -Append dist\SHA256SUMS.txt
          Get-FileHash dist\install.ps1        -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  install.ps1" }        | Out-File -Encoding ascii -Append dist\SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')   # only on a v* tag; manual runs stop after checksums
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/flaui-mcp-setup.exe
            publish/flaui-mcp.exe
            dist/install.ps1
            dist/SHA256SUMS.txt
